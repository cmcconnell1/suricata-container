# =============================================================================
# CIRCLECI CONFIGURATION FOR SURICATA CONTAINER
# =============================================================================
# This configuration defines a complete CI/CD pipeline for building, testing,
# scanning, and deploying Suricata container images to AWS ECR.
#
# Pipeline Stages:
# 1. BUILD - Compile Suricata container from source with multi-stage builds
# 2. SCAN - Security vulnerability scanning with Trivy
# 3. DEPLOY - Push Docker images to AWS ECR with temporary credentials
#
# Multi-Version Support:
# - main branch: Suricata 7.x (stable, production-ready)
# - suricata-8.x branch: Suricata 8.x (latest features)
# - suricata-7.x branch: Suricata 7.x (legacy support)
#
# AWS ECR Deployment:
# - Images pushed to: 339712848218.dkr.ecr.us-east-1.amazonaws.com/ecoe/pe/engineering/suricata
# - Uses temporary credentials via IAM role assumption
# - Multiple tags per image for version management
# - Automatic vulnerability scanning in ECR
#
# Security:
# - Uses IAM role: arn:aws:iam::339712848218:role/DevOps-Suricata-ECR-Push-Role
# - No long-term AWS credentials stored in CircleCI
# - Temporary credentials with automatic expiration
# - Trivy security scanning blocks critical vulnerabilities
#
# Required Environment Variables: None (uses IAM role for authentication)
# =============================================================================

version: 2.1

orbs:
  # AWS ECR orb for container registry operations
  aws-ecr: circleci/aws-ecr@9.4.0
  # AWS CLI orb for temporary credential management
  aws-cli: circleci/aws-cli@5.1
  # Docker orb provides Docker-related commands and utilities
  docker: circleci/docker@2.2.0

executors:
  # Standard build environment for Suricata container builds
  suricata-builder:
    docker:
      # Use CircleCI's base image with Docker and common tools
      - image: cimg/base:2023.03
    # Medium resource class provides sufficient CPU/memory for builds
    resource_class: medium

jobs:
  build:
    executor: suricata-builder
    parameters:
      suricata-version:
        type: string
        default: "7.0.11"
      alpine-version:
        type: string
        default: "3.19"
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - docker/install-docker-tools
      
      # Build image with version-specific arguments
      - run:
          name: Build Suricata container
          command: |
            echo "Building Suricata << parameters.suricata-version >> on Alpine << parameters.alpine-version >>"
            
            docker build \
              --build-arg SURICATA_VERSION=<< parameters.suricata-version >> \
              --build-arg ALPINE_VERSION=<< parameters.alpine-version >> \
              -f docker/Dockerfile \
              -t suricata:latest .
      
      # Run comprehensive functionality tests
      - run:
          name: Test built image
          command: |
            echo "Running container functionality tests..."
            
            # Test 1: Version check - Verify Suricata binary works
            echo "Testing Suricata version..."
            docker run --rm --cap-add=NET_ADMIN --cap-add=NET_RAW --entrypoint="" \
              suricata:latest sh -c "suricata -V && echo 'Version check passed'"

            # Test 2: Suricata-update tool - Verify rule management works
            echo "Testing suricata-update tool..."
            docker run --rm --cap-add=NET_ADMIN --cap-add=NET_RAW --entrypoint="" \
              suricata:latest sh -c "suricata-update --help >/dev/null 2>&1 && echo 'Suricata-update test passed' || (echo 'Suricata-update test failed' && exit 1)"

            # Test 3: Configuration validation (non-blocking in CI environment)
            echo "Testing configuration validation..."
            if docker run --rm --cap-add=NET_ADMIN --cap-add=NET_RAW --entrypoint="" \
              suricata:latest sh -c "suricata -T -c /etc/suricata/suricata.yaml"; then
              echo "Configuration validation passed"
            else
              echo "Configuration validation failed (expected in CI environment without network interfaces)"
              echo "This does not affect core Suricata functionality"
            fi
      
      # Save image for next job
      - run:
          name: Save Docker image
          command: |
            docker save suricata:latest -o suricata.tar
      
      - persist_to_workspace:
          root: .
          paths:
            - suricata.tar

  scan:
    executor: suricata-builder
    steps:
      - attach_workspace:
          at: .
      - setup_remote_docker:
          docker_layer_caching: true
      - docker/install-docker-tools

      # Load image from workspace
      - run:
          name: Load image
          command: docker load -i suricata.tar

      # Install and run Trivy security scan
      - run:
          name: Install Trivy
          command: |
            sudo apt-get update && sudo apt-get install -y wget apt-transport-https gnupg lsb-release
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
            echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
            sudo apt-get update && sudo apt-get install -y trivy

      - run:
          name: Scan image with Trivy
          command: |
            trivy image --security-checks vuln,config --exit-code 1 --severity CRITICAL suricata:latest

      - persist_to_workspace:
          root: .
          paths:
            - suricata.tar

  push-to-ecr:
    executor: suricata-builder
    parameters:
      image-tag:
        type: string
      suricata-version:
        type: string
    steps:
      - checkout
      - attach_workspace:
          at: .
      - setup_remote_docker:
          docker_layer_caching: true

      # Load image from workspace
      - run:
          name: Load image
          command: docker load -i suricata.tar

      # Tag image for ECR with multiple tags
      - run:
          name: Tag image for ECR
          command: |
            ECR_REGISTRY="339712848218.dkr.ecr.us-east-1.amazonaws.com"
            REPO_NAME="ecoe/pe/engineering/suricata"

            # Create multiple tags for better image management
            docker tag suricata:latest ${ECR_REGISTRY}/${REPO_NAME}:<< parameters.image-tag >>
            docker tag suricata:latest ${ECR_REGISTRY}/${REPO_NAME}:v<< parameters.suricata-version >>-${CIRCLE_BRANCH}-${CIRCLE_SHA1:0:7}
            docker tag suricata:latest ${ECR_REGISTRY}/${REPO_NAME}:${CIRCLE_BRANCH}-latest

            echo "Tagged images:"
            echo "- ${ECR_REGISTRY}/${REPO_NAME}:<< parameters.image-tag >>"
            echo "- ${ECR_REGISTRY}/${REPO_NAME}:v<< parameters.suricata-version >>-${CIRCLE_BRANCH}-${CIRCLE_SHA1:0:7}"
            echo "- ${ECR_REGISTRY}/${REPO_NAME}:${CIRCLE_BRANCH}-latest"

      # Push to ECR using temporary credentials via IAM role
      - aws-ecr/build_and_push_image:
          account_id: "339712848218"
          region: "us-east-1"
          repo: "ecoe/pe/engineering/suricata"
          tag: "<< parameters.image-tag >>,v<< parameters.suricata-version >>-${CIRCLE_BRANCH}-${CIRCLE_SHA1:0:7},${CIRCLE_BRANCH}-latest"
          skip_when_tags_exist: false
          use_credentials_helper: false
          auth:
            - aws-cli/setup:
                profile_name: "push-suricata-image"
                role_arn: "arn:aws:iam::339712848218:role/DevOps-Suricata-ECR-Push-Role"

workflows:
  version: 2

  # Main workflow for Suricata 7.x (main branch - default/stable)
  build_scan_deploy_7x:
    jobs:
      - build:
          name: "build-7x-main"
          suricata-version: "7.0.11"
          alpine-version: "3.19"
          filters:
            branches:
              only: main
      - scan:
          name: "scan-7x-main"
          requires:
            - "build-7x-main"
          filters:
            branches:
              only: main
      - push-to-ecr:
          name: "push-7x-main"
          image-tag: "v7.0.11-main-stable"
          suricata-version: "7.0.11"
          requires:
            - "scan-7x-main"
          filters:
            branches:
              only: main

  # Workflow for Suricata 8.x (suricata-8.x branch - latest features)
  build_scan_deploy_8x:
    jobs:
      - build:
          name: "build-8x"
          suricata-version: "8.0.0"
          alpine-version: "3.20"
          filters:
            branches:
              only: suricata-8.x
      - scan:
          name: "scan-8x"
          requires:
            - "build-8x"
          filters:
            branches:
              only: suricata-8.x
      - push-to-ecr:
          name: "push-8x"
          image-tag: "v8.0.0-latest"
          suricata-version: "8.0.0"
          requires:
            - "scan-8x"
          filters:
            branches:
              only: suricata-8.x

  # Legacy workflow for Suricata 7.x (suricata-7.x branch)
  build_scan_deploy_7x_legacy:
    jobs:
      - build:
          name: "build-7x-legacy"
          suricata-version: "7.0.11"
          alpine-version: "3.19"
          filters:
            branches:
              only: suricata-7.x
      - scan:
          name: "scan-7x-legacy"
          requires:
            - "build-7x-legacy"
          filters:
            branches:
              only: suricata-7.x
      - push-to-ecr:
          name: "push-7x-legacy"
          image-tag: "v7.0.11-legacy"
          suricata-version: "7.0.11"
          requires:
            - "scan-7x-legacy"
          filters:
            branches:
              only: suricata-7.x
