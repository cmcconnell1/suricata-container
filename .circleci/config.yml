version: 2.1

# Required Environment Variables:
# - SSH_KEY_FINGERPRINT: SSH key fingerprint for Bitbucket access
# - DOCKERHUB_USERNAME: Docker Hub username for image publishing
# - DOCKERHUB_PASSWORD: Docker Hub password/token for image publishing

orbs:
  docker: circleci/docker@2.2.0

executors:
  suricata-builder:
    docker:
      - image: cimg/base:2023.03
    resource_class: medium
    working_directory: ~/project

jobs:
  build:
    executor: suricata-builder
    steps:
      - checkout
      - add_ssh_keys:
          fingerprints:
            - "${SSH_KEY_FINGERPRINT}"
      - setup_remote_docker:
          docker_layer_caching: true
      - docker/install-docker-tools
      - run:
          name: Build Suricata image
          command: |
            docker build -f docker/Dockerfile -t suricata:latest .
      - run:
          name: Test built image
          command: |
            # Test version check
            docker run --rm --cap-add=NET_ADMIN --cap-add=NET_RAW \
              -e INTERFACE=eth0 -e UPDATE_RULES=false \
              suricata:latest -V

            # Test suricata-update tool
            docker run --rm --cap-add=NET_ADMIN --cap-add=NET_RAW --entrypoint="" \
              suricata:latest sh -c "suricata-update --help | head -5"

            # Test configuration validation
            docker run --rm --cap-add=NET_ADMIN --cap-add=NET_RAW --entrypoint="" \
              suricata:latest sh -c "suricata -T -c /etc/suricata/suricata.yaml"
      - run:
          name: Save image artifact
          command: |
            mkdir -p workspace
            docker save -o workspace/suricata.tar suricata:latest
      - persist_to_workspace:
          root: workspace
          paths:
            - suricata.tar

  scan:
    executor: suricata-builder
    steps:
      - attach_workspace:
          at: workspace
      - add_ssh_keys:
          fingerprints:
            - "${SSH_KEY_FINGERPRINT}"
      - setup_remote_docker:
          docker_layer_caching: true
      - docker/install-docker-tools
      - run:
          name: Load image
          command: docker load -i workspace/suricata.tar
      - run:
          name: Install Trivy
          command: |
            sudo apt-get update && sudo apt-get install -y wget apt-transport-https gnupg lsb-release
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
            echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
            sudo apt-get update
            sudo apt-get install -y trivy
      - run:
          name: Scan image with Trivy
          command: |
            trivy image --security-checks vuln,config --exit-code 1 --severity CRITICAL suricata:latest

  push:
    executor: suricata-builder
    steps:
      - attach_workspace:
          at: workspace
      - add_ssh_keys:
          fingerprints:
            - "${SSH_KEY_FINGERPRINT}"
      - setup_remote_docker:
          docker_layer_caching: true
      - docker/install-docker-tools
      - run:
          name: Load image
          command: docker load -i workspace/suricata.tar
      - run:
          name: Login to Docker Hub
          command: |
            echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run:
          name: Tag and push image
          command: |
            docker tag suricata:latest $DOCKERHUB_USERNAME/suricata:latest
            docker tag suricata:latest $DOCKERHUB_USERNAME/suricata:${CIRCLE_SHA1:0:7}
            docker push $DOCKERHUB_USERNAME/suricata:latest
            docker push $DOCKERHUB_USERNAME/suricata:${CIRCLE_SHA1:0:7}

workflows:
  version: 2
  build_scan_deploy:
    jobs:
      - build
      - scan:
          requires:
            - build
      - push:
          requires:
            - scan
          filters:
            branches:
              only: main
